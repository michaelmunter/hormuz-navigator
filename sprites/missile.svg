    <line x1="5" y1="-108" x2="5" y2="90" stroke="#3A3E34" stroke-width="0.5" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(58, 62, 52);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

