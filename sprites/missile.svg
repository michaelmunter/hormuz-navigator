    <rect x="-4" y="-25" width="8" height="12" rx="1" fill="none" stroke="#3E4238" stroke-width="0.6" opacity="0.5" style="fill:none;stroke:rgb(62, 66, 56);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Subtle specular highlight for readability -->
    <line x1="6" y1="-108" x2="6" y2="88" stroke="#7A7E70" stroke-width="0.5" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(122, 126, 112);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>
