<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">

  <!-- ============================================ -->
  <!-- STERN SECTION (rising out of water, tilted)  -->
  <!-- ============================================ -->
  <g transform="translate(420,180) rotate(-12)">
    <!-- Red hull lower -->
    <path d="M-10,30 L5,55 Q15,70,40,72 L160,72 Q170,68,172,60 L170,30Z" fill="#B03025"/>
    <!-- Dark hull upper -->
    <path d="M-18,0 L-10,30 L170,30 L178,0 Q180,-8,176,-12 L-14,-12 Q-20,-8,-18,0Z" fill="#2C2C2A"/>
    <!-- Deck -->
    <rect x="-15" y="-26" width="190" height="16" rx="2" fill="#8B8070"/>

    <!-- Cargo tanks (2 on stern section) -->
    <ellipse cx="30" cy="-28" rx="28" ry="12" fill="#6B6560"/>
    <rect x="2" y="-40" width="56" height="12" rx="2" fill="#7D7770"/>
    <ellipse cx="30" cy="-40" rx="28" ry="9" fill="#908880"/>

    <ellipse cx="95" cy="-28" rx="28" ry="12" fill="#6B6560"/>
    <rect x="67" y="-40" width="56" height="12" rx="2" fill="#7D7770"/>
    <ellipse cx="95" cy="-40" rx="28" ry="9" fill="#908880"/>

    <!-- Pipe manifold -->
    <line x1="0" y1="-33" x2="130" y2="-33" stroke="#5A5550" stroke-width="2"/>
    <!-- Risers -->
    <line x1="30" y1="-33" x2="30" y2="-44" stroke="#5A5550" stroke-width="1.5"/>
    <line x1="95" y1="-33" x2="95" y2="-44" stroke="#5A5550" stroke-width="1.5"/>
    <circle cx="30" cy="-44" r="2.5" fill="none" stroke="#5A5550" stroke-width="1"/>
    <circle cx="95" cy="-44" r="2.5" fill="none" stroke="#5A5550" stroke-width="1"/>

    <!-- Bridge / superstructure -->
    <rect x="130" y="-82" width="55" height="56" rx="3" fill="#D8D0C4"/>
    <rect x="134" y="-78" width="47" height="18" rx="2" fill="#384858"/>
    <rect x="137" y="-75" width="8" height="7" rx="1" fill="#6BA8D4" opacity="0.8"/>
    <rect x="149" y="-75" width="8" height="7" rx="1" fill="#6BA8D4" opacity="0.8"/>
    <rect x="161" y="-75" width="8" height="7" rx="1" fill="#6BA8D4" opacity="0.8"/>
    <!-- Upper bridge -->
    <rect x="138" y="-100" width="42" height="20" rx="2" fill="#C8C0B4"/>
    <rect x="141" y="-96" width="36" height="9" rx="1" fill="#384858"/>
    <rect x="144" y="-94" width="7" height="5" rx="1" fill="#6BA8D4" opacity="0.7"/>
    <rect x="154" y="-94" width="7" height="5" rx="1" fill="#6BA8D4" opacity="0.7"/>
    <!-- Radar mast -->
    <rect x="157" y="-126" width="3" height="26" rx="1" fill="#5A5550"/>
    <rect x="149" y="-124" width="18" height="3" rx="1" fill="#5A5550"/>
    <ellipse cx="158" cy="-128" rx="8" ry="2.5" fill="#888078"/>
    <!-- Funnel -->
    <rect x="143" y="-114" width="12" height="16" rx="2" fill="#D03020"/>
    <rect x="143" y="-114" width="12" height="5" rx="2" fill="#1A1A18"/>

    <!-- Stern shape -->
    <path d="M176,-12 L188,-10 Q194,-8,192,-2Z" fill="#2C2C2A"/>
    <path d="M170,30 L186,22 Q194,14,192,-2 L178,0Z" fill="#B03025" opacity="0.9"/>

    <!-- Waterline -->
    <line x1="-8" y1="30" x2="168" y2="30" stroke="#1A1A18" stroke-width="1.5"/>

    <!-- Broken edge at bow of this section (jagged) -->
    <path d="M-18,0 L-22,8 L-16,14 L-20,22 L-14,28 L-10,30" stroke="#1A1A18" stroke-width="1" fill="none"/>
  </g>

  <!-- ============================================ -->
  <!-- BOW SECTION (sinking, tilted down)           -->
  <!-- ============================================ -->
  <g transform="translate(120,210) rotate(18)">
    <!-- Red hull lower -->
    <path d="M-5,30 L8,55 Q18,70,45,72 L195,72 L195,30Z" fill="#B03025"/>
    <!-- Dark hull upper -->
    <path d="M-15,0 L-5,30 L195,30 L195,0 L-10,-12 Q-18,-8,-15,0Z" fill="#2C2C2A"/>
    <!-- Deck -->
    <rect x="-12" y="-26" width="207" height="16" rx="2" fill="#8B8070"/>

    <!-- Cargo tanks (3 on bow section) -->
    <ellipse cx="35" cy="-28" rx="28" ry="12" fill="#6B6560"/>
    <rect x="7" y="-40" width="56" height="12" rx="2" fill="#7D7770"/>
    <ellipse cx="35" cy="-40" rx="28" ry="9" fill="#908880"/>

    <ellipse cx="100" cy="-28" rx="28" ry="12" fill="#6B6560"/>
    <rect x="72" y="-40" width="56" height="12" rx="2" fill="#7D7770"/>
    <ellipse cx="100" cy="-40" rx="28" ry="9" fill="#908880"/>

    <ellipse cx="165" cy="-28" rx="28" ry="12" fill="#6B6560"/>
    <rect x="137" y="-40" width="56" height="12" rx="2" fill="#7D7770"/>
    <ellipse cx="165" cy="-40" rx="28" ry="9" fill="#908880"/>

    <!-- Pipe manifold -->
    <line x1="5" y1="-33" x2="195" y2="-33" stroke="#5A5550" stroke-width="2"/>
    <line x1="35" y1="-33" x2="35" y2="-44" stroke="#5A5550" stroke-width="1.5"/>
    <line x1="100" y1="-33" x2="100" y2="-44" stroke="#5A5550" stroke-width="1.5"/>
    <line x1="165" y1="-33" x2="165" y2="-44" stroke="#5A5550" stroke-width="1.5"/>
    <circle cx="35" cy="-44" r="2.5" fill="none" stroke="#5A5550" stroke-width="1"/>
    <circle cx="100" cy="-44" r="2.5" fill="none" stroke="#5A5550" stroke-width="1"/>
    <circle cx="165" cy="-44" r="2.5" fill="none" stroke="#5A5550" stroke-width="1"/>

    <!-- Bow shape -->
    <path d="M-15,0 L-28,-2 Q-36,-4,-34,-8 L-10,-12Z" fill="#2C2C2A"/>
    <path d="M-5,30 L-20,26 Q-32,20,-34,12 L-28,-2 L-15,0Z" fill="#B03025" opacity="0.9"/>

    <!-- Bow mast -->
    <rect x="-7" y="-56" width="3" height="32" rx="1" fill="#5A5550"/>
    <circle cx="-5.5" cy="-58" r="2" fill="#D03020"/>

    <!-- Waterline -->
    <line x1="-3" y1="30" x2="193" y2="30" stroke="#1A1A18" stroke-width="1.5"/>

    <!-- Broken edge at stern of this section (jagged) -->
    <path d="M195,0 L199,8 L193,14 L197,22 L191,28 L195,30" stroke="#1A1A18" stroke-width="1" fill="none"/>
  </g>

  <!-- ============================================ -->
  <!-- FIRE & SMOKE at the break point              -->
  <!-- ============================================ -->

  <!-- Smoke plumes (behind fire) -->
  <circle cx="340" cy="100" r="28" fill="#4A4844" opacity="0.2"/>
  <circle cx="360" cy="80" r="24" fill="#4A4844" opacity="0.18"/>
  <circle cx="325" cy="70" r="20" fill="#4A4844" opacity="0.15"/>
  <circle cx="355" cy="55" r="18" fill="#4A4844" opacity="0.12"/>
  <circle cx="335" cy="42" r="14" fill="#4A4844" opacity="0.1"/>
  <circle cx="350" cy="30" r="10" fill="#4A4844" opacity="0.08"/>

  <!-- Fire — cartoon starburst -->
  <g transform="translate(345,155)">
    <!-- Red outer burst -->
    <path d="M0,-45 L10,-20 L32,-35 L20,-12 L45,-4 L22,8 L38,30 L14,18 L8,42 L-2,22 L-20,40 L-12,16 L-36,28 L-20,6 L-44,-6 L-20,-8 L-30,-34 L-12,-18Z" fill="#D42020"/>
    <!-- Yellow inner -->
    <path d="M0,-26 L7,-12 L20,-18 L12,-5 L26,0 L14,6 L22,18 L8,12 L4,26 L-2,14 L-12,24 L-8,10 L-22,16 L-14,2 L-26,-2 L-12,-6 L-18,-20 L-6,-12Z" fill="#F0C020"/>
    <!-- White core -->
    <path d="M0,-12 L4,-6 L10,-8 L7,-2 L14,0 L7,3 L10,10 L4,6 L0,14 L-4,6 L-10,10 L-7,3 L-14,0 L-7,-2 L-10,-8 L-4,-6Z" fill="#FFF4C0"/>
  </g>

  <!-- Oil spill spreading from break -->
  <ellipse cx="345" cy="250" rx="55" ry="14" fill="#1A1408" opacity="0.35"/>
  <ellipse cx="330" cy="260" rx="40" ry="8" fill="#1A1408" opacity="0.25"/>
  <ellipse cx="365" cy="265" rx="30" ry="6" fill="#1A1408" opacity="0.2"/>

</svg>