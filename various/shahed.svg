<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(340,200)">

    <!-- Exhaust trail (subtle, behind the drone) -->
    <ellipse cx="0" cy="90" rx="5" ry="8" fill="#C8B8A0" opacity="0.25"/>
    <ellipse cx="0" cy="105" rx="4" ry="6" fill="#C8B8A0" opacity="0.18"/>
    <ellipse cx="1" cy="118" rx="3" ry="5" fill="#C8B8A0" opacity="0.12"/>
    <ellipse cx="-1" cy="128" rx="2.5" ry="4" fill="#C8B8A0" opacity="0.08"/>

    <!-- Main delta wing -->
    <path d="M0,-62 L72,38 L58,44 L12,46 L12,58 L8,62 L-8,62 L-12,58 L-12,46 L-58,44 L-72,38Z" fill="#2E3028"/>

    <!-- Wing panel lines -->
    <line x1="0" y1="-50" x2="62" y2="38" stroke="#222820" stroke-width="0.6" opacity="0.6"/>
    <line x1="0" y1="-50" x2="-62" y2="38" stroke="#222820" stroke-width="0.6" opacity="0.6"/>

    <!-- Fuselage center body -->
    <path d="M-10,-62 L10,-62 L12,46 L-12,46Z" fill="#3A3C32"/>
    <path d="M-8,-62 Q0,-72,8,-62" fill="#3A3C32"/>

    <!-- Nose tip -->
    <ellipse cx="0" cy="-68" rx="5" ry="4" fill="#4A4C3E"/>

    <!-- Canopy / sensor dome -->
    <ellipse cx="0" cy="-52" rx="5" ry="6" fill="#1A2418" opacity="0.8"/>

    <!-- Wing root fairings -->
    <ellipse cx="14" cy="10" rx="3" ry="16" fill="#34362C" opacity="0.5" transform="rotate(8)"/>
    <ellipse cx="-14" cy="10" rx="3" ry="16" fill="#34362C" opacity="0.5" transform="rotate(-8)"/>

    <!-- Tail fins (small V-tail stubs) -->
    <path d="M12,46 L20,60 L14,62 L12,58Z" fill="#282A22"/>
    <path d="M-12,46 L-20,60 L-14,62 L-12,58Z" fill="#282A22"/>

    <!-- Propeller hub -->
    <circle cx="0" cy="62" r="4" fill="#1A1A16"/>

    <!-- Propeller blades -->
    <ellipse cx="0" cy="62" rx="18" ry="3" fill="#222220" opacity="0.6" transform="rotate(35)"/>
    <ellipse cx="0" cy="62" rx="18" ry="3" fill="#222220" opacity="0.6" transform="rotate(-35)"/>

    <!-- Control surfaces -->
    <line x1="20" y1="40" x2="58" y2="42" stroke="#222820" stroke-width="0.8"/>
    <line x1="-20" y1="40" x2="-58" y2="42" stroke="#222820" stroke-width="0.8"/>

    <!-- Wingtip lights — brighter now for contrast -->
    <circle cx="66" cy="40" r="1.5" fill="#E03828" opacity="0.8"/>
    <circle cx="-66" cy="40" r="1.5" fill="#E03828" opacity="0.8"/>

    <!-- Thin light edge highlight on top of fuselage for readability -->
    <line x1="0" y1="-68" x2="0" y2="46" stroke="#6A6C5E" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>